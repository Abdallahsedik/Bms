name: BMS MCAL Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_target:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    - name: 2. Install Cross-Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi

    - name: 3. Cross-Compile (S32K144)
      run: make build_target

    - name: 4. Archive Output
      uses: actions/upload-artifact@v4
      with:
        name: S32K144-Binary
        path: |
          build/*.elf
          build/*.map